  <script>
    (() => {
      const header = document.querySelector("[data-header]");
      const nav = document.querySelector("[data-nav]");
      const menuBtn = document.querySelector("[data-menu]");
      const soundButtons = document.querySelectorAll("[data-sound], [data-sound-copy]");
      const soundIcon = document.querySelector("[data-sound-icon]");
      const soundFloatIcon = document.querySelector("[data-sound-float-icon]");
      const canvas = document.querySelector("#vfxCanvas");
      const ctx = canvas.getContext("2d", { alpha: true });
      const toastStack = document.querySelector("[data-toast-stack]");
      const form = document.querySelector("[data-form]");
      const formState = document.querySelector("[data-form-state]");
      const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const coarse = window.matchMedia("(pointer: coarse)").matches;
      let audioContext;
      let droneOsc;
      let droneGain;
      let soundOn = false;
      let width = 0;
      let height = 0;
      let dpr = 1;
      const pointer = { x: -999, y: -999 };
      const particles = [];
      const colors = ["255, 107, 53", "255, 209, 102", "79, 246, 195", "255, 255, 255"];

      function iconMuted() {
        return '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M23 9 17 15"></path><path d="M17 9 23 15"></path>';
      }

      function iconSound() {
        return '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.5 8.5a5 5 0 0 1 0 7"></path><path d="M19 5a10 10 0 0 1 0 14"></path>';
      }
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = width + "px";
        canvas.style.height = height + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function random(min, max) {
        return Math.random() * (max - min) + min;
      }

      function createParticle(x, y, type) {
        const isSmoke = type === "smoke";
        const life = random(120, 360);
        return {
          x,
          y,
          type,
          radius: isSmoke ? random(12, 34) : random(1.2, 3.3),
          vx: random(-0.18, 0.18),
          vy: isSmoke ? random(-0.34, -0.1) : random(-0.18, 0.16),
          alpha: isSmoke ? random(0.035, 0.1) : random(0.28, 0.74),
          life,
          maxLife: life,
          color: colors[Math.floor(Math.random() * colors.length)]
        };
      }

      function seedParticles() {
        particles.length = 0;
        const budget = coarse ? 70 : 120;
        const count = Math.min(budget, Math.floor(width * height / (coarse ? 13000 : 9000)));
        for (let index = 0; index < count; index += 1) {
          particles.push(createParticle(Math.random() * width, Math.random() * height, Math.random() > 0.58 ? "spark" : "smoke"));
        }
      }

      function burstAtCard(card) {
        if (prefersReduced) return;
        const rect = card.getBoundingClientRect();
        const x = rect.left + rect.width * 0.5;
        const y = rect.top + rect.height * 0.24;
        for (let index = 0; index < 14; index += 1) {
          const particle = createParticle(x, y, "spark");
          particle.vx = random(-2.1, 2.1);
          particle.vy = random(-3, -0.4);
          particle.radius = random(2, 4.5);
          particle.life = 42;
          particle.maxLife = 42;
          particle.alpha = 0.9;
          particles.push(particle);
        }
      }

      window.addEventListener("pointermove", (event) => {
        pointer.x = event.clientX;
        pointer.y = event.clientY;
      }, { passive: true });

      let resizeTimer = 0;
      window.addEventListener("resize", () => {
        window.clearTimeout(resizeTimer);
        resizeTimer = window.setTimeout(() => {
          resizeCanvas();
          seedParticles();
        }, 120);
      }, { passive: true });

      function drawParticle(particle, index) {
        const dx = particle.x - pointer.x;
        const dy = particle.y - pointer.y;
        const distance = Math.hypot(dx, dy);
        if (!coarse && distance < 132) {
          particle.vx += dx / 13000;
          particle.vy += dy / 13000;
        }

        particle.x += particle.vx;
        particle.y += particle.vy;
        particle.life -= 1;
        const lifeRatio = Math.max(particle.life / particle.maxLife, 0);
        const alpha = particle.alpha * lifeRatio;

        if (particle.type === "smoke") {
          const gradient = ctx.createRadialGradient(particle.x, particle.y, 0, particle.x, particle.y, particle.radius);
          gradient.addColorStop(0, "rgba(255, 255, 255, " + alpha + ")");
          gradient.addColorStop(0.44, "rgba(255, 107, 53, " + alpha * 0.42 + ")");
          gradient.addColorStop(1, "rgba(255, 255, 255, 0)");
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.fillStyle = "rgba(" + particle.color + ", " + alpha + ")";
          ctx.shadowColor = "rgba(" + particle.color + ", " + alpha + ")";
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        }

        if (particle.life <= 0 || particle.y < -80 || particle.x < -100 || particle.x > width + 100) {
          particles[index] = createParticle(random(0, width), height + random(0, 80), Math.random() > 0.62 ? "spark" : "smoke");
        }
      }

      function animate() {
        ctx.clearRect(0, 0, width, height);
        ctx.globalCompositeOperation = "lighter";
        if (!prefersReduced && Math.random() > (coarse ? 0.88 : 0.78)) {
          particles.push(createParticle(random(0, width), height + 30, "smoke"));
        }
        particles.forEach(drawParticle);
        if (particles.length > (coarse ? 95 : 155)) {
          particles.splice(0, particles.length - (coarse ? 95 : 155));
        }
        ctx.globalCompositeOperation = "source-over";
        requestAnimationFrame(animate);
      }

      if (!prefersReduced) {
        resizeCanvas();
        seedParticles();
        animate();
      }
    })();
  </script>
</body>
</html>
